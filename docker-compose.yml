services:
  # Nginx Reverse Proxy (solo producción)
  nginx:
    image: nginx:1.27-alpine
    container_name: api-nest-nginx
    ports:
      - '${NGINX_PORT:-80}:80'
      - '${NGINX_SSL_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    networks:
      - api-network
    profiles:
      - prod

  # API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
      args:
        NODE_ENV: ${NODE_ENV:-development}
    image: api-nest:${VERSION:-latest}
    container_name: api-nest
    ports:
      - '${PORT:-3000}:3000'
    expose:
      - '3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    volumes:
      - ./src:/usr/src/app/src
      - uploads:/usr/src/app/uploads
      - ./logs:/usr/src/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - api-network

  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: api-nest-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DATABASE_PORT: ${DATABASE_PORT}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${DATABASE_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - api-network

  # Redis Cache
  redis:
    image: redis:8.2.1-alpine
    container_name: api-nest-redis
    ports:
      - '${REDIS_PORT}:6379'
    expose:
      - '6379'
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - api-network

  # Migration service
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
      args:
        NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./src/migrations:/usr/src/app/src/migrations
      - ./src/seeders:/usr/src/app/src/seeders
      - ./src/config:/usr/src/app/src/config
      - ./scripts:/usr/src/app/scripts
    command: pnpm exec sequelize db:migrate --config src/config/config.cjs --migrations-path src/migrations --seeders-path src/seeders
    restart: 'no'
    security_opt:
      - no-new-privileges:true
    networks:
      - api-network

  migrate-undo:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
      args:
        NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./src/migrations:/usr/src/app/src/migrations
      - ./src/seeders:/usr/src/app/src/seeders
      - ./src/config:/usr/src/app/src/config
      - ./scripts:/usr/src/app/scripts
    command: pnpm exec sequelize db:migrate:undo:all --config src/config/config.cjs
    restart: 'no'
    security_opt:
      - no-new-privileges:true
    networks:
      - api-network

  migrate-fresh:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${NODE_ENV:-development}
      args:
        NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
    volumes:
      - ./src/migrations:/usr/src/app/src/migrations
      - ./src/seeders:/usr/src/app/src/seeders
      - ./src/config:/usr/src/app/src/config
      - ./scripts:/usr/src/app/scripts
    command: pnpm exec sequelize db:migrate:undo:all --config src/config/config.cjs --migrations-path src/migrations --seeders-path src/seeders && pnpm exec sequelize db:migrate --config src/config/config.cjs --migrations-path src/migrations --seeders-path src/seeders && pnpm exec sequelize db:seed:undo:all --config src/config/config.cjs --migrations-path src/migrations --seeders-path src/seeders
    restart: 'no'
    security_opt:
      - no-new-privileges:true
    networks:
      - api-network

networks:
  api-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads:
    driver: local
  logs:
    driver: local
  nginx_logs:
    driver: local
